{% extends "base.html" %}
{% block title %}Rediģēt ierakstu{% endblock %}

{% block content %}
<div class="form-page">
    <form method="POST" class="card big-form">
        <h1>Rediģēt ierakstu</h1>

        <label>Makšķerēšanas vieta</label>
        <select name="location" required>
            {% for location in locations %}
            <option value="{{ location }}" {% if note.location == location %}selected{% endif %}>{{ location }}</option>
            {% endfor %}
        </select>

        <div class="hint-box">
            <strong>Iespējamās zivis šai vietai:</strong> {{ suggested_fish | join(", ") }}
        </div>

        <label>Datums</label>
        <input name="date" type="date" value="{{ note.date }}" required>

        <label>Gada laiks</label>
        <select name="season" required>
            <option value="Pavasaris" {% if note.season == "Pavasaris" %}selected{% endif %}>Pavasaris</option>
            <option value="Vasara" {% if note.season == "Vasara" %}selected{% endif %}>Vasara</option>
            <option value="Rudens" {% if note.season == "Rudens" %}selected{% endif %}>Rudens</option>
            <option value="Ziema" {% if note.season == "Ziema" %}selected{% endif %}>Ziema</option>
        </select>

        <label>Laikapstākļi</label>
        <input name="weather" value="{{ note.weather }}" required>
        <label>Noķertās zivis</label>

        <div class="dropdown">
            <div class="dropdown-btn" onclick="toggleDropdown()">
                Izvēlies zivis ▼
            </div>

            <div class="dropdown-content" id="dropdownContent">
                {% for f in fish %}
                <label class="checkbox-item">
                    <input type="checkbox" name="fish" value="{{ f.id }}"
                    {% if f.id in selected_ids %}checked{% endif %}>
                    {{ f.name }}
                </label>
                {% endfor %}
            </div>
        </div>
        <label>Piezīmes</label>
        <textarea name="notes">{{ note.notes }}</textarea>

        <div class="actions">
            <button type="submit" class="btn">Saglabāt izmaiņas</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Atcelt</a>
        </div>
    </form>
</div>
{% endblock %}
